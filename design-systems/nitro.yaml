# Design OS - Nitro
# Extracted from Pencil.dev 8: prefix library (nitro.lib.pen)
# Identity: Blue accent, sharp corners, corporate/enterprise aesthetic.
# Best for: Enterprise software, banking/fintech, healthcare, government, B2B platforms.

name: "nitro"
source: "pencil:8"
description: >
  A blue-accented corporate design system with the sharpest corners in the set
  (2px base radius). Roboto for body, Roboto Mono for code/data. The tight radius
  and structured typography create a no-nonsense, enterprise-grade feel. Has the
  most comprehensive semantic color system of all four libraries, with dedicated
  success, warning, error, and info token sets.

fonts:
  heading:
    family: "'Roboto', sans-serif"
    weights: [400, 500, 700]
    source: "google"
    url: "https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap"
  body:
    family: "'Roboto', sans-serif"
    weights: [400, 500]
    source: "google"
    url: "https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap"
  mono:
    family: "'Roboto Mono', monospace"
    weights: [400, 500]
    source: "google"
    url: "https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;500&display=swap"

palette:
  light:
    primary: "#0F5FFE"
    primary-foreground: "#FFFFFF"
    background: "#FAFAFA"
    foreground: "#1A1A1A"
    card: "#FFFFFF"
    card-foreground: "#1A1A1A"
    secondary: "#EBF0FF"
    secondary-foreground: "#0F5FFE"
    muted: "#F5F5F5"
    muted-foreground: "#6B7280"
    destructive: "#DC2626"
    destructive-foreground: "#FFFFFF"
    border: "#D1D5DB"
    input: "#D1D5DB"
    ring: "#0F5FFE"
    accent: "#EBF0FF"
    accent-foreground: "#0F5FFE"
  dark:
    primary: "#4B8AFF"
    primary-foreground: "#FFFFFF"
    background: "#0B0B0F"
    foreground: "#F3F4F6"
    card: "#12121A"
    card-foreground: "#F3F4F6"
    secondary: "#1A2040"
    secondary-foreground: "#93B4FF"
    muted: "#18181F"
    muted-foreground: "#9CA3AF"
    destructive: "#EF4444"
    destructive-foreground: "#FFFFFF"
    border: "#2A2A35"
    input: "#2A2A35"
    ring: "#4B8AFF"
    accent: "#1A2040"
    accent-foreground: "#93B4FF"

semantic-colors:
  success: "#16A34A"
  success-background: "#F0FDF4"
  success-foreground: "#166534"
  success-border: "#86EFAC"
  warning: "#D97706"
  warning-background: "#FFFBEB"
  warning-foreground: "#92400E"
  warning-border: "#FCD34D"
  error: "#DC2626"
  error-background: "#FEF2F2"
  error-foreground: "#991B1B"
  error-border: "#FCA5A5"
  info: "#0F5FFE"
  info-background: "#EBF0FF"
  info-foreground: "#1E40AF"
  info-border: "#93B4FF"

label-variants:
  - "Success"
  - "Warning"
  - "Secondary"
  - "Info"

radius:
  none: 0
  xs: 2
  sm: 4
  md: 6
  lg: 8
  pill: 9999

shadows:
  sm: "0 1px 2px 0 rgb(0 0 0 / 0.04)"
  md: "0 2px 8px -2px rgb(0 0 0 / 0.08)"
  lg: "0 8px 20px -4px rgb(0 0 0 / 0.1)"

spacing:
  base: 4
  scale: [0, 1, 2, 4, 6, 8, 12, 16, 20, 24, 32, 40, 48, 64, 80, 96]

component-count: 65
