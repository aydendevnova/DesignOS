# Design OS - Ember
# Extracted from Pencil.dev 6: prefix library
# Identity: Orange accent, monospace headings, technical/developer-focused aesthetic.
# Best for: Developer tools, API platforms, CLI dashboards, technical documentation sites.

name: "ember"
source: "pencil:6"
description: >
  An orange-accented system that pairs JetBrains Mono for headings with Geist
  for body text. The monospace-heading approach signals technical credibility.
  Medium radius (16px) sits between shadcn's conservative 6px and Halo's
  generous 24px. Includes description-variant form controls (Radio Description,
  Checkbox Description) for richer input patterns.

fonts:
  heading:
    family: "'JetBrains Mono', monospace"
    weights: [400, 500, 600, 700]
    source: "google"
    url: "https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap"
  body:
    family: "'Geist', sans-serif"
    weights: [400, 500, 600]
    source: "custom"
    note: "Geist is Vercel's typeface. Install via npm: geist or load from CDN."
  mono:
    family: "'JetBrains Mono', monospace"
    weights: [400, 500]
    source: "google"
    url: "https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap"

palette:
  light:
    primary: "#FF8400"
    primary-foreground: "#FFFFFF"
    background: "#FAFAFA"
    foreground: "#1A1A1A"
    card: "#FFFFFF"
    card-foreground: "#1A1A1A"
    secondary: "#FFF3E0"
    secondary-foreground: "#E65100"
    muted: "#F5F5F5"
    muted-foreground: "#737373"
    destructive: "#DC2626"
    destructive-foreground: "#FFFFFF"
    border: "#E5E5E5"
    input: "#E5E5E5"
    ring: "#FF8400"
    accent: "#FFF3E0"
    accent-foreground: "#E65100"
  dark:
    primary: "#FF9F40"
    primary-foreground: "#1A1A1A"
    background: "#0A0A0A"
    foreground: "#FAFAFA"
    card: "#141414"
    card-foreground: "#FAFAFA"
    secondary: "#2A1F00"
    secondary-foreground: "#FFB74D"
    muted: "#1A1A1A"
    muted-foreground: "#A3A3A3"
    destructive: "#EF4444"
    destructive-foreground: "#FAFAFA"
    border: "#262626"
    input: "#262626"
    ring: "#FF9F40"
    accent: "#2A1F00"
    accent-foreground: "#FFB74D"

semantic-colors:
  success: "#16A34A"
  success-foreground: "#FFFFFF"
  warning: "#F59E0B"
  warning-foreground: "#000000"
  info: "#3B82F6"
  info-foreground: "#FFFFFF"

label-variants:
  - "Secondary"
  - "Success"
  - "Violet"
  - "Orange"

icon-labels: true

radius:
  none: 0
  xs: 4
  sm: 8
  md: 16
  lg: 24
  pill: 9999

shadows:
  sm: "0 1px 2px 0 rgb(0 0 0 / 0.05)"
  md: "0 4px 8px -2px rgb(0 0 0 / 0.1)"
  lg: "0 8px 24px -4px rgb(0 0 0 / 0.12)"
  glow: "0 0 20px -4px rgb(255 132 0 / 0.3)"

spacing:
  base: 4
  scale: [0, 1, 2, 4, 6, 8, 12, 16, 20, 24, 32, 40, 48, 64, 80, 96]

extra-form-controls:
  - "Radio Description"
  - "Checkbox Description"
  - "Icon Label/Secondary"
  - "Icon Label/Success"
  - "Icon Label/Violet"
  - "Icon Label/Orange"

component-count: 65
